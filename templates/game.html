<!DOCTYPE html>
<html>
<head>
    <title>Game Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Game Room</h1>
<h2>Code: <span id="displayCode">{{ code }}</span></h2>

<div id="statusMessage">Connecting...</div>

<hr>

<div id="gamePhase">
    <h3>Phase: <span id="phaseText">Lobby</span></h3>
</div>

<div id="roleBox" style="display:none;">
    <h3>Your Role</h3>
    <p id="roleText"></p>
    <p id="wordText"></p>
</div>

<div id="roundBox" style="display:none;">
    <h3>Round Info</h3>
    <p id="roundText"></p>
    <p id="orderText"></p>
</div>

<h3>Teams Joined:</h3>
<ul id="teamsList"></ul>

<!-- Only the host should see the "Start Game" button -->
<div id="hostControls" style="display: none;">
    <button id="startGameBtn">Start Game</button>
</div>

<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
<script>
// 1. Configuration & Setup
const socket = io({
    reconnection: true,
    reconnectionAttempts: 5
});

const code = "{{ code }}";
const isHost = localStorage.getItem("isHost") === "true";
const teamName = localStorage.getItem("teamName");
const statusDiv = document.getElementById("statusMessage");
const phaseText = document.getElementById("phaseText");
const roleBox = document.getElementById("roleBox");
const roleText = document.getElementById("roleText");
const wordText = document.getElementById("wordText");
const roundBox = document.getElementById("roundBox");
const roundText = document.getElementById("roundText");
const orderText = document.getElementById("orderText");

// 2. Validation Logic
if (!isHost && (!teamName || teamName.trim() === "")) {
    alert("Session expired or invalid team name. Returning to home.");
    window.location.href = "/";
} else {
    // 3. Emit Join Event inside a connection listener to ensure socket is ready
    socket.on("connect", () => {
        statusDiv.innerText = "Connected! Waiting for players...";
        socket.emit("join_game", { 
            code: code, 
            team: isHost ? null : teamName, 
            isHost: isHost 
        });
    });
}

// 4. Host-Specific UI logic
if (isHost) {
    const controls = document.getElementById("hostControls");
    controls.style.display = "block";
    phaseText.innerText = "Lobby (Host)";
    document.getElementById("startGameBtn").onclick = () => {
        socket.emit("start_game_request", { code: code });
    };
}

// 5. Update Teams (with deduplication check)
socket.on("update_teams", (teams) => {
    const list = document.getElementById("teamsList");
    list.innerHTML = "";
    
    // Convert to Set and back to Array to ensure unique names if server lags
    const uniqueTeams = [...new Set(teams)].filter(t => t && t.trim() !== "");
    
    if (uniqueTeams.length === 0) {
        list.innerHTML = "<li>No teams joined yet.</li>";
    }

    uniqueTeams.forEach(team => {
        const li = document.createElement("li");
        li.innerText = team;
        list.appendChild(li);
    });
});

// 6. Handle Critical Events
socket.on("error", (msg) => {
    statusDiv.innerText = "Error: " + msg;
    alert(msg);
});

socket.on("redirect", (targetCode) => {
    // Safety: ensure we redirect to the correct path
    window.location.href = "/game/" + targetCode;
});

socket.on("disconnect", () => {
    statusDiv.innerText = "Connection lost. Reconnecting...";
});
socket.on("game_started", (data) => {
    phaseText.innerText = "Role Reveal";
    roundBox.style.display = "block";
    roundText.innerText = "Round " + data.round;
    orderText.innerText = "Order: " + data.order.join(" → ");
    statusDiv.innerText = "The game has started.";
});

socket.on("role_info", (data) => {
    roleBox.style.display = "block";

    if (data.role === "HOST") {
        roleText.innerText = "You are the HOST";
        wordText.innerText = "Secret word: " + data.word + " | Impostor: " + data.impostor;
    } else if (data.role === "IMPOSTOR") {
        roleText.innerText = "You are the IMPOSTOR";
        wordText.innerText = "You do not get the secret word.";
    } else if (data.role === "HUMAN") {
        roleText.innerText = "You are HUMAN";
        wordText.innerText = "Secret word: " + data.word;
    } else {
        roleText.innerText = "Unknown role";
        wordText.innerText = "";
    }
});
</script>

</body>
</html>
