<!DOCTYPE html>
<html>
<head>
    <title>Impostor Game</title>
</head>
<body>

<h1>IMPOSTOR Hackathon Game</h1>

<button onclick="createGame()">Create Game</button>

<br><br>

<input id="code" placeholder="Enter Code">
<input id="team" placeholder="Team Name">
<button onclick="joinGame()">Join Game</button>

<h2 id="gameCode"></h2>

<h3>Teams:</h3>
<ul id="teamsList"></ul>

<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<script>
    const socket = io();

    function createGame() {
        socket.emit("create_game");
    }

    function joinGame() {
        const code = document.getElementById("code").value;
        const team = document.getElementById("team").value;

        socket.emit("join_game", { code: code, team: team });
    }

    socket.on("game_created", (code) => {
        document.getElementById("gameCode").innerText = "Game Code: " + code;
    });

    socket.on("update_teams", (teams) => {
        const list = document.getElementById("teamsList");
        list.innerHTML = "";

        teams.forEach(team => {
            const li = document.createElement("li");
            li.innerText = team;
            list.appendChild(li);
        });
    });

    socket.on("error", (msg) => {
        alert(msg);
    });
</script>

</body>
</html>
